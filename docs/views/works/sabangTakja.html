<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabangtakja In Paper</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>

<body>
    <div id="header"></div>
    <div class="layout">

            <div class="image-container scroll-fade">
                <img src="/assets/images/sabangTakja_1.jpg" alt="SABANGTAKJA IN PAPER">

                <div class="project-info">
                    <div class="project-title">SABANGTAKJA IN PAPER</div>
                    <div class="project-details">
                        2025<br>
                        135 × 23 × 23 cm<br>

                        <br>
                    </div>
