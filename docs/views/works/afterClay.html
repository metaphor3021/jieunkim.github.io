<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After Clay</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>

<body>
    <div id="header"></div>
    <div class="layout">

        <div id="sidebar"></div>
        <div id="menu"></div>

        <!-- 본문 -->
        <main class="content">
            <div class="image-container scroll-fade">
                <img src="/assets/images/afterClay_1.jpg" alt="Held Shape 2">
            </div>

            <div class="image-container scroll-fade">
                <img src="/assets/images/afterClay_main.jpg" alt="After Clay">
                <!-- 프로젝트 정보 -->
                <div class="project-info">
                    <div class="project-title">After Clay</div>
                    <div class="project-details">
                        2026<br>
                        newspaper, hanji, bio-based composite<br>
                        30 × 23 × 23 cm<br>
                        18 × 15 × 15 cm<br>
                        19 × 10 × 10 cm<br>
                    </div>
                    <div class="project-description">
                        Forms are first shaped in clay and later removed. <br>
                        The vessels stand without internal reinforcement.
                        <br>
                    </div>
                </div>
            </div>

            <div class="image-container scroll-fade">
                <img src="/assets/images/afterClay_2.jpg" alt="Held Shape 2">
            </div>

            <div class="image-container scroll-fade">
                <img src="/assets/images/afterClay_3.jpg" alt="After Clay">
                <!-- 프로젝트 정보 -->
                <div class="project-info">
                    <div class="project-title">
                        <span class="small-text">
                            Exhibited at<br>
                            "Ipchun" (입춘전)
                        </span>
                    </div>
                    <div class="project-details">
                        Group exhibition<br>
                        20 Feb – 20 Mar 2026<br>
                        Vormgeving Realisatie<br>
                    </div>
                    <div class="project-description">
                        <br>
                    </div>
                </div>
            </div>

    </div>
    <!-- 스크립트 -->
    <script src="/js/common.js"></script>
