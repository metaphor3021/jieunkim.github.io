<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Held Shape</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>

<body>
    <div id="header"></div>
    <div class="layout">

        <div id="sidebar"></div>
        <div id="menu"></div>

        <!-- 본문 -->
        <main class="content">
            <div class="image-container scroll-fade">
                <img src="/assets/images/heldShape_thumb.jpg" alt="Held Shape">
                <!-- 프로젝트 정보 -->
                <div class="project-info">
                    <div class="project-title">Held Shape</div>
                    <div class="project-details">
                        2025<br>
                        41 × 24 × 24 cm<br>
                        egg carton, eggshell, natural glue, Korean lacquer<br>
                    </div>
                    <div class="project-description">
                        A vessel recalling the Korean jangdok.<br>
                        Fragile materials settle into form.
                        <br>
                    </div>
                </div>
            </div>
            <!-- DETAILS -->
            <div class="details-section scroll-fade">
                <div class="details-title">DETAILS</div>
                <div class="detail-images">
                    <img src="/assets/images/heldShape_detail1.jpg" alt="">
                    <img src="/assets/images/heldShape_detail2.jpg" alt="">

            </div>
        </main>
    </div>
    <!-- 스크립트 -->
    <script src="/js/common.js"></script>

</html>
