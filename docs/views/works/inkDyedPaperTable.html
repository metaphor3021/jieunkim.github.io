<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ink-dyed Paper Table</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>

<body>
    <div id="header"></div>
    <div class="layout">

        <div id="sidebar"></div>
        <div id="menu"></div>

        <!-- 본문 -->
        <main class="content">
            <div class="image-container scroll-fade">
                <img src="/assets/images/inkDyedPaperTable_0.jpg" alt="INK-DYED PAPER TABLER">
            </div>
            <div class="image-container scroll-fade">
                <img src="/assets/images/inkDyedPaperTable_1.jpg" alt="INK-DYED PAPER TABLER">
            </div>
            <div class="image-container scroll-fade">
                <img src="/assets/images/inkDyedPaperTable_2.jpg" alt="INK-DYED PAPER TABLER">
            </div>
            <div class="image-container scroll-fade">
                <img src="/assets/images/inkDyedPaperTable_3.jpg" alt="INK-DYED PAPER TABLER">
                <!-- 프로젝트 정보 -->
                <div class="project-info">
                    <div class="project-title">INK-DYED PAPER TABLE</div>
                    <div class="project-details">
                        2025<br>
                        53 × 98 × 40 cm<br>
                        ink-dyed newspaper, oil, varnish<br>
                    </div>
                    <div class="project-description">
                        Constructed from stacked layers of dyed newspaper, forming a solid structure.<br>
                        Variations in ink density create a natural grain across the surface.
                        <br>
                    </div>
                </div>
            </div>


            <!-- DETAILS -->
            <div class="details-section scroll-fade">
                <div class="details-title">DETAILS</div>
                <div class="detail-images">
                    <img src="/assets/images/inkDyedPaperTable_detail1.jpg" alt="">
                    <img src="/assets/images/inkDyedPaperTable_detail2.jpg" alt="">
                </div>
                
            </div>
        </main>
    </div>
    <!-- 스크립트 -->
    <script src="/js/common.js"></script>
